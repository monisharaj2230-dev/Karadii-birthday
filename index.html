<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, rgba(255,0,0,0.2), black 70%);
    z-index:-1;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    color:#ff1e56;
    font-size:2.5rem;
    text-shadow:0 0 20px #ff1e56;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:12px 25px;
    background:#ff1e56;
    border:none;
    color:white;
    border-radius:30px;
    cursor:pointer;
}

/* AUDIO */
audio{
    margin-top:15px;
}

/* SLIDER */
.slider{
    overflow:hidden;
    white-space:nowrap;
    margin-top:40px;
}

.slider-track{
    display:inline-block;
    animation:scroll 25s linear infinite;
}

.slider-track img{
    width:200px;
    height:200px;
    margin:10px;
    border-radius:15px;
    object-fit:cover;
}

@keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* VIDEO */
.video-section{
    display:none;
    padding:40px;
    text-align:center;
}

video{
    width:90%;
    max-width:600px;
    border-radius:15px;
}

/* HEARTS */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    top:0;
    left:0;
}

.heart{
    position:fixed;
    bottom:-20px;
    font-size:20px;
    color:red;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}

</style>

</head>

<body>

<!-- ❤️ HEARTS -->
<div class="hearts"></div>

<!-- HERO -->
<section class="hero">

<h1>Happy Birthday ❤️</h1>

<p>Wishing you endless happiness 🎉</p>

<!-- 🎵 AUDIO (FIXED FOR MOBILE) -->
<audio id="bgMusic" loop>
  <source src="karimizhi-kuruviye.mp4" type="audio/mp4">
</audio>

<button class="btn" onclick="playMusic()">
Play Music 🎵
</button>

<button class="btn" onclick="openSurprise()">
Open Surprise 🎁
</button>

</section>

<!-- 🎥 VIDEO -->
<section class="video-section" id="videoSection">

<h2 style="color:#ff1e56;">Special Surprise ❤️</h2>

<video controls>
  <source src="lv_0_20260603111450.mp4" type="video/mp4">
</video>

</section>

<!-- 📸 15 PHOTO SLIDER -->
<section class="slider">

<div class="slider-track">

<img src="1000327411.jpg">
<img src="1000327412.jpg">
<img src="1000327403.jpg">
<img src="1000327414.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">
<img src="photo10.jpg">
<img src="photo11.jpg">
<img src="photo12.jpg">
<img src="photo13.jpg">
<img src="photo14.jpg">
<img src="photo15.jpg">

<!-- duplicate for smooth scroll -->
<img src="1000327411.jpg">
<img src="1000327412.jpg">
<img src="1000327403.jpg">
<img src="1000327414.jpg">

</div>

</section>

<script>

/* 🎵 PLAY MUSIC (fix autoplay issue) */
function playMusic(){
    const audio = document.getElementById("bgMusic");
    audio.play();
}

/* 🎁 OPEN SURPRISE */
function openSurprise(){
    document.getElementById("videoSection").style.display = "block";
    document.getElementById("videoSection").scrollIntoView({behavior:"smooth"});
}

/* ❤️ FLOATING HEARTS */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
